<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contattaci | MyFrEM - La migliore piattaforma in Friuli-Venezia Giulia nel caricamento foto inerenti l'emergenza</title>
  <link rel="shortcut icon" href="https://friuliemergenze.it/assets/logo.png" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/dashboard/dsh.css">
  <script type="module" src="./contact.js"></script>
</head>
<body class="layout">
  <aside class="sidebar">
    <div class="logo">
      <img src="https://friuliemergenze.it/assets/logo.png" alt="MyFrEM Logo">
      <h2>MyFrEM</h2>
    </div>
    <nav>
      <a href="/dashboard">🏠 Home</a>
      <a href="/dashboard/upload">📸 Carica una foto</a>
      <a href="/dashboard/all-photos">📸 Le mie foto</a>
      <a href="/dashboard/create-event/">🗂️ Crea un evento</a>
      <a href="/dashboard/all-events/">🗂️ I miei eventi</a>
      <a href="/dashboard/settings/">⚙️ Impostazioni</a>
      <a href="/dashboard/contact/" class="active">📞 Contattaci</a>
    </nav>
    <button id="logoutBtn" class="logout">🚪 Logout</button>
  </aside>

  <div class="main-content">
    <div class="content-box">
      <h2>📩 Contattaci</h2>
      <p>Hai trovato un bug? Hai bisogno di assistenza? Inviaci un messaggio.</p>

      <form id="contactForm">
        <input type="text" id="subject" placeholder="Oggetto del messaggio" required>
        <textarea id="message" rows="6" placeholder="Scrivi qui il tuo messaggio..." required></textarea>
        <button type="submit">Invia messaggio</button>
      </form>

      <p id="result" style="margin-top:10px;"></p>
    </div>
  </div>
</body>
</html>
