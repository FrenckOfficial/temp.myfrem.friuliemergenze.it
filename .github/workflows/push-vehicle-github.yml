name: Push Vehicle to GitHub

on:
  workflow_dispatch:
    inputs:
      draftId:
        description: 'ID della bozza da pubblicare'
        required: true

jobs:
  push-to-github:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install firebase-admin @octokit/rest

      - name: Push Vehicle Data to GitHub
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          GITHUB_TOKEN: ${{ secrets.GT_TOKEN }}
          DRAFT_ID: ${{ github.event.inputs.draftId }}
        run: node .github/workflows/pushVehicle.mjs

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "feat: Add vehicle from draft ${{ github.event.inputs.draftId }}" || echo "No changes to commit"
          git push

      - name: Notify on Success
        if: success()
        run: echo "✅ Vehicle published successfully!"

      - name: Notify on Failure
        if: failure()
        run: echo "❌ Failed to publish vehicle"