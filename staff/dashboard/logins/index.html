<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestione Logins | Dashboard Staff - La migliore piattaforma in Friuli-Venezia Giulia nel caricamento foto inerenti l'emergenza</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="/staff/dashboard/management/users-whatsapp/style.css">
  <link rel="shortcut icon" href="https://friuliemergenze.it/assets/logo.png" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script type="module" src="/staff/dashboard/logins/load.js"></script>
  <style type="text/css">
    .sidebar {
      height: 100vh;
      width: 250px;
    }
  </style>
</head>
<body>
  <!-- Sidebar Staff -->
  <aside class="sidebar">
    <div class="logo">
      <img src="https://friuliemergenze.it/assets/logo.png" alt="MyFrEM Logo">
      <h2>MyFrEM Staff</h2>
    </div>
    <nav>
      <a href="/staff">📊 Dashboard</a>
      <a href="/staff/dashboard/photos/">🖼️ Moderazione foto</a>
      <a href="/staff/dashboard/users/" class="active">👥 Funzionalità</a>
      <a href="/staff/dashboard/events/">🗂️ Moderazione eventi</a>
      <a href="/staff/dashboard/kick-reports/">🗂️ Rapporti di espulsione</a>
      <a href="/staff/dashboard/contactrq/">📞 Richieste di assistenza</a>
      <a href="/staff/dashboard/settings/">⚙️ Impostazioni</a>
    </nav>
    <button id="logoutBtn" class="logout">🚪 Logout</button>
  </aside>

  <!-- Main content -->
  <main class="main-content">
    <h1>Tutti i logins</h1>
    <a href="/staff/dashboard/logins/export/" class="btn-primary mb-3">📥 Esporta CSV</a>

    <table id="usersTable">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Data e ora accesso</th>
          <th>UID</th>
          <th>Azioni</th>
        </tr>
      </thead>
      <tbody id="usersTableBody">
        <!-- JS Loading -->
      </tbody>
    </table>

    <p id="messageBox"></p>
  </main>
</body>
</html>
