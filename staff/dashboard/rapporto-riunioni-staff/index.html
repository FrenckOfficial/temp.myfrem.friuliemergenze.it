<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <title>Riunioni Staff - MyFrEM - La migliore in Friuli-Venezia Giulia nel caricamento foto inerenti l'emergenza</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="shortcut icon" href="https://friuliemergenze.it/assets/logo.png" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script type="module" src="./load.js"></script>
</head>
<body>
    <aside class="sidebar">
      <div class="logo">
        <img src="https://friuliemergenze.it/assets/logo.png" alt="MyFrEM Logo">
        <h2>MyFrEM Staff</h2>
      </div>
      <nav>
        <a href="/staff">📊 Dashboard</a>
        <a href="/staff/dashboard/photos/">🖼️ Moderazione foto</a>
        <a href="/staff/dashboard/users/" class="active">👥 Funzionalità</a>
        <a href="/staff/dashboard/events/">🗂️ Moderazione eventi</a>
        <a href="/staff/dashboard/kick-reports/">🗂️ Rapporti di espulsione</a>
        <a href="/staff/dashboard/contactrq/">📞 Richieste di assistenza</a>
        <a href="/staff/dashboard/settings/">⚙️ Impostazioni</a>
      </nav>
      <button id="logoutBtn" class="logout">🚪 Logout</button>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h2>📄 Riunioni Staff</h2>
            <p>Elenco estratti riunioni staff.</p>
            <a href="/staff/dashboard/rapporto-riunioni-staff/new/" class="btn-primary">
                ➕ Nuovo Report
            </a>
        </div>
        <div class="reports-table">
            <table>
                <thead>
                    <tr>
                        <th>ID Report</th>
                        <th>Data</th>
                        <th>Ordine del giorno</th>
                        <th>Staffer</th>
                        <th>Visualizza</th>
                    </tr>
                </thead>

                <tbody id="listaRiunioni">
                    <!-- Righe generate da JS -->
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
