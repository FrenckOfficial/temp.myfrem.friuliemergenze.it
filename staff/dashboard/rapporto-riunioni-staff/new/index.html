<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <title>Nuovo Report - Riunioni Staff - MyFrEM - La migliore in Friuli-Venezia Giulia nel caricamento foto inerenti l'emergenza</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="shortcut icon" href="https://friuliemergenze.it/assets/logo.png" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script type="module" src="./save.js"></script>
</head>
<body>
    <aside class="sidebar">
      <div class="logo">
        <img src="https://friuliemergenze.it/assets/logo.png" alt="MyFrEM Logo">
        <h2>MyFrEM Staff</h2>
      </div>
      <nav>
        <a href="/staff">📊 Dashboard</a>
        <a href="/staff/dashboard/photos/">🖼️ Moderazione foto</a>
        <a href="/staff/dashboard/users/">👥 Funzionalità</a>
        <a href="/staff/dashboard/events/">🗂️ Moderazione eventi</a>
        <a href="/staff/dashboard/kick-reports/">🗂️ Rapporti di espulsione</a>
        <a href="/staff/dashboard/contactrq/">📞 Richieste di assistenza</a>
        <a href="/staff/dashboard/settings/">⚙️ Impostazioni</a>
      </nav>
      <button id="logoutBtn" class="logout">🚪 Logout</button>
    </aside>
    <div class="main-content">
        <div class="top-bar">
            <h1>Report Riunione Staff</h1>
        </div>
        <p>Compila qui sotto per registrare l'esito di una riunione dello staff</p>
        <div class="activity-box">
            <form id="reunionReportForm">
                <div class="form-row">
                    <div class="form-col">
                        <label for="startDate">Data e ora inizio:</label>
                        <input type="datetime-local" id="startDate" class="photo-link-input" required>
                    </div>
                    <div class="form-col">
                        <label for="finishDate">Data e ora fine:</label>
                        <input type="datetime-local" id="endDate" class="photo-link-input" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-col">
                        <label for="ordine">Ordine del giorno:</label>
                        <input type="text" id="ordine" class="photo-link-input" required>
                    </div>
                    <div class="form-col">
                        <h4>Staffer di apertura e chiusura</h4>
                        <span id="opener" class="photo-link-input opener-input"></span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="description">Esito finale della riunione</label>
                    <textarea id="description" class="photo-link-input" required></textarea>
                </div>
                <div class="form-group">
                    <button type="submit" class="quick-btn send-report">Invia e carica Report</button>
                </div>
            </form>
            <div id="statusMsg"></div>
        </div>
    </div>
</body>
</html>
