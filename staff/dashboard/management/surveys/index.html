<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizzazione sondaggi gradimento - Dashboard Staff | MyFrEM - La migliore piattaforma in Friuli-Venezia Giulia nel caricamento foto inerenti l'emergenza</title>
    <link rel="stylesheet" href="/staff/dashboard/staff.css">
    <link rel="shortcut icon" href="https://friuliemergenze.it/assets/logo.png" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script type="module" src="/staff/dashboard/management/surveys/load.js"></script>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <img src="https://friuliemergenze.it/assets/logo.png" alt="MyFrEM Logo">
            <h2>MyFrEM Staff</h2>
        </div>
        <nav>
            <a href="/staff/">📊 Dashboard</a>
            <a href="/staff/dashboard/photos/">🖼️ Moderazione foto</a>
            <a href="/staff/dashboard/users/" class="active">👥 Funzionalità</a>
            <a href="/staff/dashboard/events/">🗂️ Moderazione eventi</a>
            <a href="/staff/dashboard/kick-reports/">🗂️ Rapporti di espulsione</a>
            <a href="/staff/dashboard/contactrq/">📞 Richieste di assistenza</a>
            <a href="/staff/dashboard/settings/">⚙️ Impostazioni</a>
        </nav>
        <button id="logoutBtn" class="logout">🚪 Logout</button>
    </aside>
    <div class="main-content">
        <h1>💬 Sondaggi di Gradimento</h1>
        <p id="statusMsg" class="statusBox" style="display:none;"></p>
        <table>
            <thead>
                <tr>
                    <td><b>ID</b></td>
                    <td><b>Nome</b></td>
                    <td><b>Email</b></td>
                    <td><b>Valutazione</b></td>
                    <td><b>Commento</b></td>
                    <td><b>Data</b></td>
                </tr>
            </thead>
            <tbody id="surveyTableBody">
                <!-- JS Loading -->
            </tbody>
        </table>
    </div>
</body>
</html>
