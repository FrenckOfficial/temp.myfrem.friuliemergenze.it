<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestione Utenti WhatsApp | Dashboard Staff - La migliore piattaforma in Friuli-Venezia Giulia nel caricamento foto inerenti l'emergenza</title>
  <link rel="stylesheet" href="/staff/dashboard/management/users-whatsapp/style.css">
  <link rel="shortcut icon" href="https://friuliemergenze.it/assets/logo.png" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script type="module" src="/staff/dashboard/management/users-whatsapp/users.js"></script>
</head>
<body>
  <aside class="sidebar">
    <div class="logo">
      <img src="https://friuliemergenze.it/assets/logo.png" alt="MyFrEM Logo">
      <h2>MyFrEM Staff</h2>
    </div>
    <nav>
      <a href="/staff">📊 Dashboard</a>
      <a href="/staff/dashboard/photos/">🖼️ Moderazione foto</a>
      <a href="/staff/dashboard/users/" class="active">👥 Funzionalità</a>
      <a href="/staff/dashboard/events/">🗂️ Moderazione eventi</a>
      <a href="/staff/dashboard/kick-reports/">🗂️ Rapporti di espulsione</a>
      <a href="/staff/dashboard/contactrq/">📞 Richieste di assistenza</a>
      <a href="/staff/dashboard/settings/">⚙️ Impostazioni</a>
    </nav>
    <button id="logoutBtn" class="logout">🚪 Logout</button>
  </aside>

  <main class="main-content">
    <h1>Gestione utenze WhatsApp - 👥 Funzionalità</h1>

    <div class="list">
      <a href="/staff/dashboard/management/users-whatsapp/new/" class="btn-primary">➕ Nuovo utente</a>
      <p id="totalUsers"><b>Utenti totali: <span id="totalUsersCount">0</span></b></p>
    </div>

    <div class="gallery-search" style="margin-top: 10px;">
      <input type="text" id="searchInput" placeholder="Cerca un utente..." style="
        width: 50%;
        padding: 0.75rem;
        margin: 1rem 0;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 1rem;
      ">
    </div>

    <table id="usersTable">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Telefono</th>
          <th>Tipo account</th>
          <th>Stato Account</th>
          <th style="text-align:center;">Azioni</th>
        </tr>
      </thead>
      <tbody id="usersTableBody">
        <!-- JS Loading -->
      </tbody>
    </table>

    <p id="messageBox"></p>
    <script>
      const searchInput = document.getElementById("searchInput");
      const tableBody = document.getElementById("usersTableBody");

      searchInput.addEventListener("keyup", () => {
        const filter = searchInput.value.toLowerCase();
        const rows = tableBody.querySelectorAll("tr");

        rows.forEach(row => {
          const text = row.textContent.toLowerCase();
          row.style.display = text.includes(filter) ? "" : "none";
        });
      });
    </script>
  </main>
</body>
</html>
