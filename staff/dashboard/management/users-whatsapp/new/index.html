<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuovo - Utente WhatsApp | MyFrEM - La migliore piattaforma in Friuli-Venezia Giulia nel caricamento foto inerenti l'emergenza</title>
  <link rel="stylesheet" href="/staff/dashboard/management/users-whatsapp/new/style.css">
  <link rel="shortcut icon" href="https://friuliemergenze.it/assets/logo.png" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script type="module" src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script type="module" src="/staff/dashboard/management/users-whatsapp/new/new-user.js"></script>
</head>
<body>
  <aside class="sidebar">
    <div class="logo">
      <img src="https://friuliemergenze.it/assets/logo.png" alt="Logo MyFrEM">
      <h2>MyFrEM Staff</h2>
    </div>
    <nav>
      <a href="/staff">📊 Dashboard</a>
      <a href="/staff/dashboard/photos/">🖼️ Moderazione foto</a>
      <a href="/staff/dashboard/users/" class="active">👥 Funzionalità</a>
      <a href="/staff/dashboard/events/">🗂️ Moderazione eventi</a>
      <a href="/staff/dashboard/kick-reports/">🗂️ Rapporti di espulsione</a>
      <a href="/staff/dashboard/contactrq/">📞 Richieste di assistenza</a>
      <a href="/staff/dashboard/settings/">⚙️ Impostazioni</a>
    </nav>
    <button id="logoutBtn" class="logout">🚪 Logout</button>
  </aside>
  <main class="main-content">
    <div class="top-bar">
        <h1>📄 Nuovo Utente WhatsApp</h1>
    </div>

    <p>Compila il modulo qui sotto per aggiungere un nuovo utente WhatsApp.</p>
    <p id="statusMsg" class="statusBox" style="display:none;"></p>
    <div class="activity-box">
        <form id="expulsionReportForm">
            <div class="form-row">
              <div class="form-col">
                <label for="userSelect">👤 Nome utente:</label>
                <textarea id="userSelect" class="photo-link-input"></textarea>
              </div>

              <div class="form-col">
                <label for="userNumber">📞 Numero contatto utente:</label>
                <input type="tel" id="userNumber" class="photo-link-input">
              </div>
            </div>
            <div class="form-group">
                <label for="expulsionDate">📅 Data entrata:</label>
                <input type="date" id="expulsionDate" class="photo-link-input" required>
            </div>
            <div class="form-group">
                <label for="notes">🗒️ Note aggiuntive (facoltativo):</label>
                <textarea id="notes" class="photo-link-input" placeholder="Eventuali note aggiuntive..."></textarea>
            </div>
            <div class="form-group">
              <h3>🏷️ Tag utente</h3>
              <div id="tagsContainer">
                <label><input type="checkbox" class="tagCheck" value="Amministratore"> #Amministratore</label><br>
                <label><input type="checkbox" class="tagCheck" value="Nuovo Utente"> #Nuovo Utente</label><br>
                <label><input type="checkbox" class="tagCheck" value="Membro"> #Membro</label><br>
                <label><input type="checkbox" class="tagCheck" value="Membro OG"> #Membro OG (prima del 10/2025)</label><br>
                <label><input type="checkbox" class="tagCheck" value="Staff"> #Staff</label><br>
              </div>
            </div>

            <div class="form-group">
              <h3>🔗 Collegamento a utente MyFrEM</h3>
              <input id="myfremIdInput" type="text" class="photo-link-input" placeholder="ID utente MyFrEM">
              <button type="button" id="linkMyFremBtn" class="quick-btn">🔍 Collega</button>

              <div id="myfremResult" style="margin-top:10px;font-size:14px;display:none;"></div>
            </div>
            <div class="form-group">
                <button type="submit" class="quick-btn">📤 Aggiungi Utente</button>
            </div>
        </form>
        <div id="statusMsg"></div>
    </div>
  </main>
</body>
</html>
